name: Real Estate Scraper Cron Jobs

on:
  schedule:
    # 20:00 CET/CEST corresponds to 19:00 or 18:00 UTC depending on daylight saving. 
    # Usando 18:00 UTC como aproximación para verano.
    - cron: '0 18 * * *'
    # 07:00 CET/CEST corresponds to 06:00 or 05:00 UTC.
    # Usando 05:00 UTC.
    - cron: '0 5 * * *'
  workflow_dispatch: # Permite ejecución manual desde la interfaz de GitHub

jobs:
  run-scraper-or-filter:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install undetected-chromedriver==3.5.5 beautifulsoup4==4.12.3
        
    - name: Install Chrome (for undetected-chromedriver)
      # undetected-chromedriver suele descargar su propio binario, pero asegurar dependencias base ayuda
      run: |
        sudo apt-get update
        sudo apt-get install -y wget xvfb unzip
        
    - name: Run Scraper (if 18:00 UTC / 20:00 Local)
      # Ejecuta solo si es la hora del cron de scraping o si se forzó manualmente
      if: github.event.schedule == '0 18 * * *' || github.event_name == 'workflow_dispatch'
      env:
        GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
      # Usar xvfb-run para simular una pantalla para Chrome headless
      run: xvfb-run --auto-servernum python scraper.py --scrape

    - name: Run Filter (if 05:00 UTC / 07:00 Local)
      # Ejecuta solo si es la hora del cron de filtrado
      if: github.event.schedule == '0 5 * * *'
      env:
        GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
      run: python scraper.py --filter
